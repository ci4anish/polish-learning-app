name: Snappy
options:
  bundleIdPrefix: com.tpohoretskyi
  deploymentTarget:
    iOS: "26.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0

targets:
  Snappy:
    type: application
    platform: iOS
    sources:
      - path: Snappy
    configFiles:
      Debug: Configs/Config.xcconfig
      Release: Configs/Config.xcconfig
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        INFOPLIST_FILE: Snappy/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.tpohoretskyi.snappy
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
