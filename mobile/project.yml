name: Yaps
options:
  bundleIdPrefix: com.yaps
  deploymentTarget:
    iOS: "26.0"
  generateEmptyDirectories: true
targets:
  Yaps:
    type: application
    platform: iOS
    sources:
      - path: Yaps
    settings:
      base:
        INFOPLIST_FILE: Yaps/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.yaps.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
